<!DOCTYPE html>
<html>
<head>
    <title>Verdiqt Connection Test</title>
</head>
<body>
    <h1>Verdiqt Backend Connection Test</h1>
    <button onclick="testConnection()">Test Backend Connection</button>
    <div id="result"></div>

    <script>
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing connection...';
            
            try {
                // Test health endpoint
                const healthResponse = await fetch('http://localhost:8000/health');
                const healthData = await healthResponse.json();
                
                // Test analyze endpoint
                const analyzeResponse = await fetch('http://localhost:8000/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        reviews: ['This is a test review', 'Another test review']
                    })
                });
                const analyzeData = await analyzeResponse.json();
                
                resultDiv.innerHTML = `
                    <h3>✅ Connection Successful!</h3>
                    <p><strong>Health:</strong> ${JSON.stringify(healthData)}</p>
                    <p><strong>Analysis:</strong> ${JSON.stringify(analyzeData, null, 2)}</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3>❌ Connection Failed!</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>Make sure the backend is running: <code>cd verdiqt/backend && uvicorn main:app --reload</code></p>
                `;
            }
        }
    </script>
</body>
</html>
