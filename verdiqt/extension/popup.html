<!-- Popup HTML for Verdiqt extension -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            width: 300px; 
            padding: 20px;
            background: #0F0F1A;
            color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }
        
        h2 {
            margin: 0 0 15px 0;
            color: #667EEA;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }
        
        p {
            margin: 0 0 10px 0;
            line-height: 1.5;
            text-align: center;
            color: #CBD5E0;
            font-size: 14px;
        }
        
        .highlight {
            color: #667EEA;
            font-weight: 500;
        }
        
        .features {
            background: #1A202C;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }
        
        .feature:last-child {
            margin-bottom: 0;
        }
        
        .feature-icon {
            margin-right: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h2>Verdiqt</h2>
    <p>AI-powered sentiment analysis for <span class="highlight">any website</span></p>
    <p>Click the <span class="highlight">V</span> button on any page with text content to analyze sentiment</p>
    
    <div class="features">
        <div class="feature">
            <span class="feature-icon">🌐</span>
            <span>Works on any website</span>
        </div>
        <div class="feature">
            <span class="feature-icon">🗣️</span>
            <span>11 languages supported</span>
        </div>
        <div class="feature">
            <span class="feature-icon">🎯</span>
            <span>Real-time sentiment analysis</span>
        </div>
        <div class="feature">
            <span class="feature-icon">🏷️</span>
            <span>Visual sentiment badges</span>
        </div>
    </div>
</body>
</html>
