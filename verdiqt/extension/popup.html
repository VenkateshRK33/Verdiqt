<!-- Popup HTML for Verdiqt extension -->
<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            width: 280px; 
            padding: 20px;
            background: #0F0F1A;
            color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }
        
        h2 {
            margin: 0 0 15px 0;
            color: #667EEA;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }
        
        p {
            margin: 0;
            line-height: 1.5;
            text-align: center;
            color: #CBD5E0;
            font-size: 14px;
        }
        
        .highlight {
            color: #667EEA;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <h2>Verdiqt</h2>
    <p>Visit <span class="highlight">Amazon</span> or <span class="highlight">Flipkart</span> and click the <span class="highlight">V</span> button to analyze reviews</p>
</body>
</html>
